<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="author" content="Ricardo Lopez Reyero">
<title>Escritos - Portadas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fb;
  --ink: #131722;
  --muted: #677085;
  --line: #dfe4ee;
  --panel: #ffffff;
  --panel-soft: #f8fafd;
  --accent: #175cff;
  --accent-ink: #ffffff;
  --shadow: 0 24px 70px rgba(30, 42, 72, 0.16);
}

* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
  margin: 0;
}

body {
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  background: var(--bg);
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app {
  min-height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 16px clamp(18px, 4vw, 42px);
  background: rgba(255, 255, 255, 0.86);
  border-bottom: 1px solid rgba(20, 27, 41, 0.08);
  backdrop-filter: blur(18px);
}

.brand {
  min-width: 0;
}

.brand strong {
  display: block;
  font-size: 18px;
  letter-spacing: 0;
}

.brand span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 13px;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.btn {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 0 14px;
  color: var(--ink);
  background: #fff;
  font-weight: 700;
  font-size: 13px;
  transition:
    transform 180ms ease,
    border-color 180ms ease,
    box-shadow 180ms ease,
    background 180ms ease;
}

.btn:hover {
  transform: translateY(-1px);
  border-color: rgba(23, 92, 255, 0.28);
}

.btn.primary {
  color: var(--accent-ink);
  background: var(--accent);
  box-shadow: 0 12px 28px rgba(23, 92, 255, 0.22);
}

.btn.primary:hover {
  box-shadow: 0 14px 34px rgba(23, 92, 255, 0.28);
}

.btn.compact {
  min-height: 32px;
  padding: 0 10px;
  font-size: 12px;
}

.btn.full {
  width: 100%;
}

.layout {
  display: grid;
  grid-template-columns: minmax(310px, 390px) minmax(0, 1fr);
  min-height: 0;
}

.panel {
  border-right: 1px solid rgba(20, 27, 41, 0.08);
  background: rgba(255, 255, 255, 0.68);
  overflow-y: auto;
}

.controls {
  display: grid;
  gap: 20px;
  padding: 22px;
}

.group {
  display: grid;
  gap: 10px;
}

.group-title {
  color: #2c3445;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.field {
  display: grid;
  gap: 7px;
}

.field label,
.toggle-row span {
  color: #343c4d;
  font-size: 13px;
  font-weight: 700;
}

.field textarea,
.field input,
.field select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  outline: none;
  background: #fff;
  color: var(--ink);
  padding: 11px 12px;
  transition: border-color 170ms ease, box-shadow 170ms ease;
}

.field textarea {
  min-height: 104px;
  line-height: 1.42;
  resize: vertical;
}

.field textarea.article-input {
  min-height: 230px;
}

.field textarea:focus,
.field input:focus,
.field select:focus {
  border-color: rgba(23, 92, 255, 0.58);
  box-shadow: 0 0 0 4px rgba(23, 92, 255, 0.09);
}

.seed-box {
  display: grid;
  gap: 8px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel-soft);
}

.seed-line {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
  font-size: 12px;
}

.seed-line b {
  max-width: 210px;
  overflow: hidden;
  color: #293044;
  font-weight: 700;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.toggle-row {
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.switch {
  position: relative;
  width: 42px;
  height: 24px;
  flex: 0 0 auto;
}

.switch input {
  position: absolute;
  inset: 0;
  opacity: 0;
}

.switch i {
  position: absolute;
  inset: 0;
  border-radius: 999px;
  background: #d7deeb;
  transition: background 180ms ease;
}

.switch i::before {
  content: "";
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 7px rgba(27, 38, 62, 0.2);
  transition: transform 180ms ease;
}

.switch input:checked + i {
  background: var(--accent);
}

.switch input:checked + i::before {
  transform: translateX(18px);
}

.segmented {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.segmented button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.segmented button.active {
  border-color: rgba(23, 92, 255, 0.4);
  color: var(--accent);
  background: rgba(23, 92, 255, 0.07);
}

.stage {
  min-width: 0;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 18px;
  padding: clamp(22px, 4vw, 48px);
}

.canvas-shell {
  width: min(100%, 900px);
  display: grid;
  gap: 12px;
}

.canvas-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.preview-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 2;
  border-radius: 14px;
  background: #d7deeb;
  box-shadow: var(--shadow);
}

canvas {
  display: block;
}

#coverCanvas {
  width: 100%;
  height: 100%;
  border-radius: inherit;
  cursor: crosshair;
}

.variant-grid {
  width: min(100%, 900px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.variant {
  border: 1px solid rgba(20, 27, 41, 0.08);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.74);
  padding: 7px;
  transition: border-color 180ms ease, transform 180ms ease;
}

.variant:hover {
  border-color: rgba(23, 92, 255, 0.36);
  transform: translateY(-1px);
}

.variant.active {
  border-color: rgba(23, 92, 255, 0.7);
}

.variant canvas {
  width: 100%;
  aspect-ratio: 3 / 2;
  border-radius: 7px;
}

.position-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.position-grid button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.position-grid button.active {
  border-color: rgba(23, 92, 255, 0.44);
  color: var(--accent);
  background: rgba(23, 92, 255, 0.07);
}

.range-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.range-label output {
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.seo-board {
  width: min(100%, 900px);
  display: grid;
  gap: 12px;
}

.seo-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.seo-head h2 {
  margin: 0;
  color: #202737;
  font-size: 18px;
  letter-spacing: 0;
}

.seo-head span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.seo-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.seo-item {
  min-width: 0;
  display: grid;
  gap: 7px;
  border: 1px solid rgba(20, 27, 41, 0.08);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.76);
  padding: 11px;
}

.seo-item.wide {
  grid-column: 1 / -1;
}

.seo-item-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.seo-item label {
  color: #343c4d;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.seo-value {
  min-height: 22px;
  overflow-wrap: anywhere;
  color: #182032;
  font-size: 14px;
  line-height: 1.45;
}

.seo-value.empty {
  color: var(--muted);
}

.keyword-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.keyword-list span {
  border: 1px solid rgba(23, 92, 255, 0.14);
  border-radius: 999px;
  background: rgba(23, 92, 255, 0.06);
  color: #244064;
  padding: 5px 9px;
  font-size: 12px;
  font-weight: 700;
}

.order-list {
  margin: 0;
  padding-left: 20px;
  color: #2a3346;
  font-size: 13px;
  line-height: 1.6;
}

.order-list b {
  color: #121827;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 22px;
  z-index: 5;
  transform: translate(-50%, 80px);
  border-radius: 8px;
  background: #111827;
  color: #fff;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  box-shadow: 0 16px 44px rgba(17, 24, 39, 0.24);
  transition: transform 220ms ease;
}

.toast.show {
  transform: translate(-50%, 0);
}

@media (max-width: 900px) {
  .topbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .actions {
    width: 100%;
    justify-content: stretch;
  }

  .actions .btn {
    flex: 1 1 135px;
  }

  .layout {
    grid-template-columns: 1fr;
  }

  .panel {
    border-right: 0;
    border-bottom: 1px solid rgba(20, 27, 41, 0.08);
  }

  .controls {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .group:first-child,
  .group:last-child {
    grid-column: 1 / -1;
  }
}

@media (max-width: 620px) {
  .controls {
    grid-template-columns: 1fr;
  }

  .variant-grid {
    gap: 8px;
  }

  .canvas-meta {
    align-items: flex-start;
    flex-direction: column;
    gap: 5px;
  }

  .seo-grid {
    grid-template-columns: 1fr;
  }

  .seo-head {
    align-items: flex-start;
    flex-direction: column;
  }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <strong>Escritos - Portadas</strong>
      <span>600 x 400 px - exportacion 1X y 2X</span>
    </div>
    <div class="actions">
      <button class="btn" id="copyBtn" type="button">Copiar PNG</button>
      <button class="btn" id="download1xBtn" type="button">Descargar 1X</button>
      <button class="btn primary" id="download2xBtn" type="button">Descargar 2X</button>
    </div>
  </header>

  <main class="layout">
    <aside class="panel">
      <div class="controls">
        <section class="group">
          <div class="group-title">Escrito</div>
          <div class="field">
            <label for="articleInput">Pega aqui el articulo</label>
            <textarea id="articleInput" class="article-input" placeholder="Pega tu escrito completo. La herramienta supone titulo, slug, categoria, descripcion SEO, palabras clave y alt text."></textarea>
          </div>
          <button class="btn primary full" id="analyzeBtn" type="button">Analizar y llenar SEO</button>
        </section>

        <section class="group">
          <div class="group-title">Portada</div>
          <div class="field">
            <label for="titleInput">Titulo</label>
            <textarea id="titleInput" maxlength="130">Como hacer un gran trabajo</textarea>
          </div>
          <div class="toggle-row">
            <span>Mostrar titulo</span>
            <label class="switch">
              <input id="showTitleInput" type="checkbox" checked>
              <i></i>
            </label>
          </div>
          <div class="toggle-row">
            <span>Solo degradado</span>
            <label class="switch">
              <input id="gradientOnlyInput" type="checkbox">
              <i></i>
            </label>
          </div>
        </section>

        <section class="group">
          <div class="group-title">Composicion</div>
          <div class="field">
            <label for="paletteInput">Color premium</label>
            <select id="paletteInput"></select>
          </div>
          <div class="field">
            <label>Titulo</label>
            <div class="segmented" id="titleStyleGroup">
              <button type="button" data-style="editorial" class="active">Editorial</button>
              <button type="button" data-style="glass">Cristal</button>
              <button type="button" data-style="quiet">Quieto</button>
            </div>
          </div>
          <div class="field">
            <label>Alineacion</label>
            <div class="segmented" id="alignGroup">
              <button type="button" data-align="left">Izq</button>
              <button type="button" data-align="center" class="active">Centro</button>
              <button type="button" data-align="right">Der</button>
            </div>
          </div>
          <div class="field">
            <label>Posicion en cuadricula</label>
            <div class="position-grid" id="positionGrid">
              <button type="button" data-x="18" data-y="24">Arriba izq</button>
              <button type="button" data-x="50" data-y="24">Arriba</button>
              <button type="button" data-x="82" data-y="24">Arriba der</button>
              <button type="button" data-x="18" data-y="52">Centro izq</button>
              <button type="button" data-x="50" data-y="52">Centro</button>
              <button type="button" data-x="82" data-y="52">Centro der</button>
              <button type="button" data-x="18" data-y="78">Abajo izq</button>
              <button type="button" data-x="50" data-y="78" class="active">Abajo</button>
              <button type="button" data-x="82" data-y="78">Abajo der</button>
            </div>
          </div>
          <div class="field">
            <label for="titleXInput" class="range-label">Mover horizontal <output id="titleXValue">50%</output></label>
            <input id="titleXInput" type="range" min="8" max="92" value="50">
          </div>
          <div class="field">
            <label for="titleYInput" class="range-label">Mover vertical <output id="titleYValue">78%</output></label>
            <input id="titleYInput" type="range" min="18" max="88" value="78">
          </div>
          <div class="field">
            <label for="titleSizeInput" class="range-label">Tamano titulo <output id="titleSizeValue">62%</output></label>
            <input id="titleSizeInput" type="range" min="42" max="95" value="62">
          </div>
        </section>

        <section class="group">
          <div class="group-title">Detalle</div>
          <div class="toggle-row">
            <span>Figuras finas</span>
            <label class="switch">
              <input id="detailInput" type="checkbox" checked>
              <i></i>
            </label>
          </div>
          <div class="toggle-row">
            <span>Grano sutil</span>
            <label class="switch">
              <input id="grainInput" type="checkbox" checked>
              <i></i>
            </label>
          </div>
          <div class="field">
            <label for="softnessInput">Suavidad</label>
            <input id="softnessInput" type="range" min="0" max="100" value="72">
          </div>
        </section>

        <section class="group">
          <div class="group-title">Nacimiento</div>
          <button class="btn primary" id="randomBtn" type="button">Nuevo random unico</button>
          <div class="seed-box">
            <div class="seed-line"><span>Semilla</span><b id="seedLabel"></b></div>
            <div class="seed-line"><span>Minuto</span><b id="minuteLabel"></b></div>
            <div class="seed-line"><span>Decima</span><b id="deciLabel"></b></div>
          </div>
        </section>
      </div>
    </aside>

    <section class="stage">
      <div class="canvas-shell">
        <div class="canvas-meta">
          <span id="paletteLabel"></span>
          <span>600 x 400 - 1200 x 800</span>
        </div>
        <div class="preview-wrap">
          <canvas id="coverCanvas" width="1200" height="800"></canvas>
        </div>
      </div>
      <div class="variant-grid" id="variantGrid"></div>
      <section class="seo-board" aria-live="polite">
        <div class="seo-head">
          <div>
            <h2>SEO express</h2>
            <span id="seoStatus">Pega un escrito y analiza</span>
          </div>
          <button class="btn compact" id="copyAllSeoBtn" type="button">Copiar todo</button>
        </div>
        <div class="seo-grid" id="seoGrid"></div>
      </section>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>

  titleX: 50,

const els = {

function pad(value, size = 2) {

function readHistory() {

function makeBirthSeed(offset = 0) {
  const now = new Date()
  const decisecond = Math.floor(now.getMilliseconds() / 100)
  const perf = Math.floor((performance.now() * 10) % 100000)
  const minuteKey = `${pad(now.getHours())}${pad(now.getMinutes())}`
  const stamp = [
    now.getFullYear(),
    pad(now.getMonth() + 1),
    pad(now.getDate()),
    minuteKey,
    pad(now.getSeconds()),
    decisecond,
    pad(now.getMilliseconds(), 3),
    pad(perf, 5),
    offset,
  ].join('-')
  return {
    seed: `escritos-${stamp}`,
    born: {
      iso: now.toISOString(),
      minute: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
      decisecond,
    },
  }
}

function uniqueBirth(offset = 0) {
  const history = readHistory()
  let birth = makeBirthSeed(offset)
  let guard = 0
  while (history.includes(birth.seed) && guard < 30) {
    guard += 1
    birth = makeBirthSeed(offset + guard)
  }
  history.push(birth.seed)
  writeHistory(history)
  return birth
}

function hashSeed(seed) {
  let hash = 2166136261
  for (let i = 0; i < seed.length; i += 1) {
    hash ^= seed.charCodeAt(i)
    hash = Math.imul(hash, 16777619)
  }
  return hash >>> 0
}

function randomFrom(seed) {
  let value = hashSeed(seed)
  return function next() {
    value += 0x6d2b79f5
    let t = value
    t = Math.imul(t ^ (t >>> 15), t | 1)
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61)
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296
  }
}

function pick(rand, items) {
  return items[Math.floor(rand() * items.length) % items.length]
}

function hexToRgb(hex) {
  const clean = hex.replace('#', '')
  const value = parseInt(clean, 16)
  return {
    r: (value >> 16) & 255,
    g: (value >> 8) & 255,
    b: value & 255,
  }
}

function rgba(hex, alpha) {
  const rgb = hexToRgb(hex)
  return `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alpha})`
}

function getPalette(seed) {
  const rand = randomFrom(`${seed}:palette`)
  const available = palettes.filter((palette) => palette.id !== 'random')
  if (state.paletteId === 'random') {
    return pick(rand, available)
  }
  return palettes.find((palette) => palette.id === state.paletteId) || available[0]
}

function createLinearPoints(width, height, angle) {
  const cx = width / 2
  const cy = height / 2
  const length = Math.hypot(width, height)
  const dx = Math.cos(angle) * length / 2
  const dy = Math.sin(angle) * length / 2
  return [cx - dx, cy - dy, cx + dx, cy + dy]
}

function drawMeshGradient(targetCtx, width, height, config) {
  const rand = randomFrom(`${config.seed}:mesh`)
  const palette = getPalette(config.seed)
  const softness = config.softness / 100
  const angle = rand() * Math.PI * 2
  const [x1, y1, x2, y2] = createLinearPoints(width, height, angle)
  const linear = targetCtx.createLinearGradient(x1, y1, x2, y2)
  const ordered = [...palette.colors].sort(() => rand() - 0.5)

  ordered.forEach((color, index) => {
    const stop = ordered.length === 1 ? 0 : index / (ordered.length - 1)
    linear.addColorStop(stop, color)
  })

  targetCtx.fillStyle = linear
  targetCtx.fillRect(0, 0, width, height)

  const layerCount = 7 + Math.floor(rand() * 5)
  targetCtx.save()
  targetCtx.globalCompositeOperation = 'screen'
  for (let i = 0; i < layerCount; i += 1) {
    const color = pick(rand, ordered)
    const x = width * (-0.12 + rand() * 1.24)
    const y = height * (-0.16 + rand() * 1.32)
    const radius = Math.max(width, height) * (0.26 + rand() * (0.54 + softness * 0.18))
    const glow = targetCtx.createRadialGradient(x, y, 0, x, y, radius)
    glow.addColorStop(0, rgba(color, 0.5 - softness * 0.12))
    glow.addColorStop(0.34 + rand() * 0.22, rgba(color, 0.16 + softness * 0.1))
    glow.addColorStop(1, rgba(color, 0))
    targetCtx.fillStyle = glow
    targetCtx.fillRect(0, 0, width, height)
  }
  targetCtx.restore()

  targetCtx.save()
  targetCtx.globalCompositeOperation = 'overlay'
  const haze = targetCtx.createLinearGradient(0, 0, width, height)
  haze.addColorStop(0, 'rgba(255,255,255,0.18)')
  haze.addColorStop(0.52, 'rgba(255,255,255,0.02)')
  haze.addColorStop(1, 'rgba(6,12,32,0.18)')
  targetCtx.fillStyle = haze
  targetCtx.fillRect(0, 0, width, height)
  targetCtx.restore()

  return palette
}

function drawDetails(targetCtx, width, height, config) {
  if (!config.details || config.gradientOnly) return

  const rand = randomFrom(`${config.seed}:details`)
  const baseX = width * (0.46 + rand() * 0.18)
  const baseY = height * (0.44 + rand() * 0.18)
  const scale = Math.min(width, height)

  targetCtx.save()
  targetCtx.strokeStyle = 'rgba(255,255,255,0.55)'
  targetCtx.fillStyle = 'rgba(255,255,255,0.08)'
  targetCtx.lineWidth = Math.max(1, width / 700)

  for (let i = 0; i < 3; i += 1) {
    const radius = scale * (0.16 + rand() * 0.13)
    const x = baseX + (rand() - 0.5) * width * 0.2
    const y = baseY + (rand() - 0.5) * height * 0.2
    targetCtx.beginPath()
    targetCtx.arc(x, y, radius, 0, Math.PI * 2)
    targetCtx.fill()
    targetCtx.stroke()
  }

  targetCtx.globalAlpha = 0.5
  for (let i = 0; i < 42; i += 1) {
    const x = baseX + (rand() - 0.5) * width * 0.44
    const y = baseY + (rand() - 0.5) * height * 0.44
    const r = Math.max(1.2, scale * (0.004 + rand() * 0.01))
    targetCtx.beginPath()
    targetCtx.arc(x, y, r, 0, Math.PI * 2)
    targetCtx.fillStyle = `rgba(255,255,255,${0.18 + rand() * 0.18})`
    targetCtx.fill()
  }

  targetCtx.globalAlpha = 0.24
  targetCtx.setLineDash([Math.max(3, width / 160), Math.max(5, width / 110)])
  for (let i = 0; i < 2; i += 1) {
    targetCtx.beginPath()
    targetCtx.arc(baseX, baseY, scale * (0.32 + i * 0.13), Math.PI * 0.8, Math.PI * 1.95)
    targetCtx.stroke()
  }
  targetCtx.restore()
}

function addNoise(targetCtx, width, height, seed, enabled) {
  if (!enabled) return
  const rand = randomFrom(`${seed}:grain`)
  const image = targetCtx.getImageData(0, 0, width, height)
  const data = image.data
  for (let i = 0; i < data.length; i += 4) {
    const n = (rand() - 0.5) * 9
    data[i] = Math.max(0, Math.min(255, data[i] + n))
    data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + n))
    data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + n))
  }
  targetCtx.putImageData(image, 0, 0)
}

function wrapLines(targetCtx, text, maxWidth, maxLines) {
  const words = String(text || '').trim().split(/\s+/).filter(Boolean)
  if (!words.length) return []
  const lines = []
  let current = ''

  words.forEach((word) => {
    const next = current ? `${current} ${word}` : word
    if (targetCtx.measureText(next).width <= maxWidth || !current) {
      current = next
    } else {
      lines.push(current)
      current = word
    }
  })
  if (current) lines.push(current)

  if (lines.length <= maxLines) return lines

  const trimmed = lines.slice(0, maxLines)
  while (targetCtx.measureText(`${trimmed[trimmed.length - 1]}...`).width > maxWidth && trimmed[trimmed.length - 1].length > 3) {
    trimmed[trimmed.length - 1] = trimmed[trimmed.length - 1].slice(0, -1).trim()
  }
  trimmed[trimmed.length - 1] = `${trimmed[trimmed.length - 1]}...`
  return trimmed
}

function fitTitle(targetCtx, text, width, maxWidth, sizePercent) {
  const scale = Math.max(42, Math.min(95, Number(sizePercent) || 62)) / 100
  let size = Math.round(width * 0.072 * scale)
  const minSize = Math.round(width * 0.03)

  while (size >= minSize) {
    targetCtx.font = `800 ${size}px Inter, sans-serif`
    if (targetCtx.measureText(text).width <= maxWidth) {
      return { size, lines: [text] }
    }
    size -= 2
  }

  targetCtx.font = `800 ${minSize}px Inter, sans-serif`
  return { size: minSize, lines: wrapLines(targetCtx, text, maxWidth, 2) }
}

function drawTitle(targetCtx, width, height, config) {
  const title = String(config.title || '').trim()
  if (!config.showTitle || config.gradientOnly || !title) return

  const padding = width * 0.052
  const maxWidth = width * 0.9
  const { size, lines } = fitTitle(targetCtx, title, width, maxWidth, config.titleSize)
  const lineHeight = size * 1.08
  const blockHeight = lines.length * lineHeight
  const x = width * (Math.max(8, Math.min(92, Number(config.titleX) || 50)) / 100)
  const y = height * (Math.max(18, Math.min(88, Number(config.titleY) || 78)) / 100)
  const align = config.titleAlign || 'center'
  const widestLine = lines.reduce((max, line) => Math.max(max, targetCtx.measureText(line).width), 0)

  targetCtx.save()
  if (config.titleStyle === 'glass') {
    const boxWidth = widestLine + padding * 1.2
    const boxHeight = blockHeight + padding * 0.46
    const boxX = align === 'center' ? x - boxWidth / 2 : align === 'right' ? x - boxWidth : x - padding * 0.22
    const boxY = y - boxHeight / 2 - size * 0.08
    roundRect(targetCtx, boxX, boxY, boxWidth, boxHeight, Math.max(12, width * 0.022))
    targetCtx.fillStyle = 'rgba(255,255,255,0.16)'
    targetCtx.fill()
    targetCtx.strokeStyle = 'rgba(255,255,255,0.32)'
    targetCtx.lineWidth = Math.max(1, width / 900)
    targetCtx.stroke()
  } else if (config.titleStyle === 'editorial') {
    const fade = targetCtx.createLinearGradient(0, height * 0.18, 0, height)
    fade.addColorStop(0, 'rgba(4,8,22,0)')
    fade.addColorStop(1, 'rgba(4,8,22,0.16)')
    targetCtx.fillStyle = fade
    targetCtx.fillRect(0, 0, width, height)
  }

  targetCtx.textAlign = align
  targetCtx.textBaseline = 'middle'
  targetCtx.font = `800 ${size}px Inter, sans-serif`
  targetCtx.fillStyle = 'rgba(255,255,255,0.96)'
  targetCtx.shadowColor = 'rgba(8,12,28,0.36)'
  targetCtx.shadowBlur = size * 0.16
  targetCtx.shadowOffsetY = size * 0.055

  lines.forEach((line, index) => {
    const lineY = y - blockHeight / 2 + lineHeight * index + lineHeight / 2
    targetCtx.fillText(line, x, lineY)
  })
  targetCtx.restore()
}

function roundRect(targetCtx, x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2)
  targetCtx.beginPath()
  targetCtx.moveTo(x + r, y)
  targetCtx.arcTo(x + width, y, x + width, y + height, r)
  targetCtx.arcTo(x + width, y + height, x, y + height, r)
  targetCtx.arcTo(x, y + height, x, y, r)
  targetCtx.arcTo(x, y, x + width, y, r)
  targetCtx.closePath()
}

function renderToCanvas(canvas, scale, config) {
  const width = CANVAS_WIDTH * scale
  const height = CANVAS_HEIGHT * scale
  canvas.width = width
  canvas.height = height
  const targetCtx = canvas.getContext('2d', { willReadFrequently: true })
  const palette = drawMeshGradient(targetCtx, width, height, config)
  drawDetails(targetCtx, width, height, config)
  addNoise(targetCtx, width, height, config.seed, config.grain)
  drawTitle(targetCtx, width, height, config)
  return palette
}

function render() {

  els.seedLabel.textContent = state.seed.replace('escritos-', '')

function renderVariants() {

function sanitizeFileName(value) {
  return String(value || 'escritos-portada')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[<>:"/\\|?*\u0000-\u001F]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .toLowerCase()
    .slice(0, 70) || 'escritos-portada'
}

function normalizeText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
}

function cleanText(value) {
  return String(value || '')
    .replace(/\r/g, '')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim()
}

function toSlug(value) {
  return normalizeText(value)
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '')
    .slice(0, 82) || 'escrito'
}

function splitSentences(text) {
  return cleanText(text)
    .replace(/\n+/g, ' ')
    .split(/(?<=[.!?])\s+/)
    .map((sentence) => sentence.trim())
    .filter(Boolean)
}

function looksLikeTitle(line) {
  const words = line.split(/\s+/).filter(Boolean)
  if (words.length < 3 || words.length > 16) return false
  if (line.length > 92) return false
  return !/[.!?;:]$/.test(line)
}

function inferTitle(text) {
  const lines = cleanText(text)
    .split('\n')
    .map((line) => line.replace(/^#+\s*/, '').trim())
    .filter(Boolean)

  const firstTitle = lines.find(looksLikeTitle)
  if (firstTitle) return firstTitle

  const firstSentence = splitSentences(text)[0] || ''
  if (!firstSentence) return 'Nuevo escrito'

  const words = firstSentence.split(/\s+/).filter(Boolean)
  return words.slice(0, 12).join(' ').replace(/[,.!?;:]$/, '')
}

function keywordsFromText(text, title) {
  const source = normalizeText(`${title} ${text}`)
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter((word) => word.length > 3 && !stopWords.has(word))

  const score = new Map()
  source.forEach((word) => score.set(word, (score.get(word) || 0) + 1))

  for (let i = 0; i < source.length - 1; i += 1) {
    const first = source[i]
    const second = source[i + 1]
    if (first === second) continue
    const phrase = `${first} ${second}`
    score.set(phrase, (score.get(phrase) || 0) + 2.2)
  }

  categoryRules.forEach((rule) => {
    rule.terms.forEach((term) => {
      if (source.includes(term)) {
        score.set(term, (score.get(term) || 0) + 2)
      }
    })
  })

  return [...score.entries()]
    .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
    .map(([word]) => word)
    .filter((word, index, list) => {
      if (index > 20) return false
      return !list.slice(0, index).some((prev) => prev.includes(word) || word.includes(prev))
    })
    .slice(0, 12)
}

function inferCategory(text, keywords) {
  const source = normalizeText(`${text} ${keywords.join(' ')}`)
  let best = { name: 'Generales', score: 0 }

  categoryRules.forEach((rule) => {
    const score = rule.terms.reduce((sum, term) => {
      const matches = source.match(new RegExp(`\\b${term}\\b`, 'g'))
      return sum + (matches ? matches.length : 0)
    }, 0)
    if (score > best.score) best = { name: rule.name, score }
  })

  return best.name
}

function buildDescription(text, title) {
  const titleNorm = normalizeText(title)
  const sentences = splitSentences(text).filter((sentence) => normalizeText(sentence) !== titleNorm)
  let description = sentences.slice(0, 2).join(' ')

  if (!description) {
    description = `Reflexion sobre ${title}.`
  }

  if (description.length > 250) {
    description = description.slice(0, 247).replace(/\s+\S*$/, '') + '...'
  }

  return description
}

function analyzeArticle() {
  const article = cleanText(els.article.value)
  const typedTitle = cleanText(els.title.value)
  const title = article ? inferTitle(article) : typedTitle || 'Nuevo escrito'
  const finalTitle = typedTitle && typedTitle !== 'Como hacer un gran trabajo' && !article ? typedTitle : title
  const slug = toSlug(finalTitle)
  const keywords = keywordsFromText(article || finalTitle, finalTitle)
  const category = inferCategory(article || finalTitle, keywords)
  const description = buildDescription(article || finalTitle, finalTitle)
  const canonical = `${BLOG_BASE_URL}${slug}`
  const alt = `Portada del escrito "${finalTitle}" de ${DEFAULT_AUTHOR}`
  const wordCount = article ? article.split(/\s+/).filter(Boolean).length : 0

  state.seo = {
    title: finalTitle,
    slug,
    category,
    author: DEFAULT_AUTHOR,
    canonical,
    keywords,
    description,
    alt,
    status: 'Borrador',
    wordCount,
  }

  els.title.value = finalTitle
  configFromInputs()
  render()
  renderVariants()
  renderSeo()
  saveProject()
  toast('SEO listo')
}

function fieldText(key) {
  if (!state.seo) return ''
  if (key === 'keywords') return state.seo.keywords.join(', ')
  if (key === 'order') return buildCopyAll()
  return state.seo[key] || ''
}

async function copyText(value) {
  const text = String(value || '')
  if (!text) return
  if (navigator.clipboard && navigator.clipboard.writeText) {
    await navigator.clipboard.writeText(text)
    toast('Copiado')
    return
  }

  const textarea = document.createElement('textarea')
  textarea.value = text
  textarea.setAttribute('readonly', '')
  textarea.style.position = 'absolute'
  textarea.style.left = '-9999px'
  document.body.appendChild(textarea)
  textarea.select()
  document.execCommand('copy')
  textarea.remove()
  toast('Copiado')
}

function buildCopyAll() {
  if (!state.seo) return ''
  return [
    `Estado: ${state.seo.status}`,
    `Slug de URL: ${state.seo.slug}`,
    `Categoria: ${state.seo.category}`,
    `Autor: ${state.seo.author}`,
    `Enlace canonico: ${state.seo.canonical}`,
    `Titulo: ${state.seo.title}`,
    `Texto alternativo portada: ${state.seo.alt}`,
    `Descripcion de la publicacion: ${state.seo.description}`,
    `Palabras clave: ${state.seo.keywords.join(', ')}`,
  ].join('\n')
}

function renderSeo() {
  const empty = !state.seo
  const fields = empty
    ? [
        ['slug', 'Slug de URL', 'Aun sin analizar'],
        ['category', 'Categoria', 'Aun sin analizar'],
        ['title', 'Titulo', 'Aun sin analizar'],
        ['description', 'Descripcion', 'Pega el escrito y pulsa analizar.'],
      ]
    : [
        ['status', 'Publicar o programar', state.seo.status],
        ['slug', 'Slug de URL', state.seo.slug],
        ['category', 'Categoria', state.seo.category],
        ['author', 'Autor', state.seo.author],
        ['canonical', 'Enlace canonico', state.seo.canonical, true],
        ['title', 'Titulo', state.seo.title, true],
        ['alt', 'Texto alternativo', state.seo.alt, true],
        ['description', 'Descripcion', state.seo.description, true],
        ['keywords', 'Palabras clave', state.seo.keywords, true],
        ['order', 'Orden para pegar', '', true],
      ]

  els.seoGrid.innerHTML = ''
  fields.forEach(([key, label, value, wide]) => {
    const item = document.createElement('article')
    item.className = `seo-item${wide ? ' wide' : ''}`

    const head = document.createElement('div')
    head.className = 'seo-item-head'

    const labelEl = document.createElement('label')
    labelEl.textContent = label
    head.appendChild(labelEl)

    const copyButton = document.createElement('button')
    copyButton.className = 'btn compact'
    copyButton.type = 'button'
    copyButton.textContent = 'Copiar'
    copyButton.disabled = empty
    copyButton.addEventListener('click', () => copyText(fieldText(key)))
    head.appendChild(copyButton)
    item.appendChild(head)

    if (key === 'keywords' && !empty) {
      const list = document.createElement('div')
      list.className = 'keyword-list'
      state.seo.keywords.forEach((keyword) => {
        const chip = document.createElement('span')
        chip.textContent = keyword
        list.appendChild(chip)
      })
      item.appendChild(list)
    } else if (key === 'order' && !empty) {
      const list = document.createElement('ol')
      list.className = 'order-list'
      ;[
        ['Slug de URL', state.seo.slug],
        ['Categoria', state.seo.category],
        ['Autor', state.seo.author],
        ['Enlace canonico', state.seo.canonical],
        ['Titulo', state.seo.title],
        ['Imagen de portada', 'descarga PNG 2X y subelo al campo de portada'],
        ['Texto alternativo', state.seo.alt],
        ['Descripcion', state.seo.description],
        ['Palabras clave', state.seo.keywords.join(', ')],
      ].forEach(([name, content]) => {
        const li = document.createElement('li')
        const strong = document.createElement('b')
        strong.textContent = `${name}:`
        li.appendChild(strong)
        li.append(' ')
        li.append(document.createTextNode(content))
        list.appendChild(li)
      })
      item.appendChild(list)
    } else {
      const valueEl = document.createElement('div')
      valueEl.className = `seo-value${empty ? ' empty' : ''}`
      valueEl.textContent = Array.isArray(value) ? value.join(', ') : value
      item.appendChild(valueEl)
    }

    els.seoGrid.appendChild(item)
  })

  els.seoStatus.textContent = empty
    ? 'Pega un escrito y analiza'
    : `${state.seo.wordCount || 'Sin'} palabras detectadas`
  els.copyAllSeo.disabled = empty
}

function download(scale) {
  const canvas = document.createElement('canvas')
  renderToCanvas(canvas, scale, state)
  const link = document.createElement('a')
  const title = state.gradientOnly || !state.title.trim() ? 'degradado-premium' : state.title
  link.download = `${sanitizeFileName(title)}-${CANVAS_WIDTH * scale}x${CANVAS_HEIGHT * scale}.png`
  link.href = canvas.toDataURL('image/png')
  link.click()
}

async function copyPng() {
  const canvas = document.createElement('canvas')
  renderToCanvas(canvas, 2, state)
  if (!navigator.clipboard || typeof ClipboardItem === 'undefined') {
    download(2)
    toast('PNG 2X descargado')
    return
  }
  const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'))
  await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
  toast('PNG copiado')
}

function syncTitleVisibility() {
  if (els.gradientOnly.checked) {
    els.showTitle.checked = false
    els.showTitle.disabled = true
  } else {
    els.showTitle.disabled = false
  }
}

function syncPositionControls() {
  els.titleXValue.textContent = `${Math.round(state.titleX)}%`
  els.titleYValue.textContent = `${Math.round(state.titleY)}%`
  els.titleSizeValue.textContent = `${Math.round(state.titleSize)}%`

  let bestButton = null
  let bestDistance = Infinity
  els.positionGrid.querySelectorAll('button').forEach((button) => {
    const dx = Number(button.dataset.x) - state.titleX
    const dy = Number(button.dataset.y) - state.titleY
    const distance = Math.hypot(dx, dy)
    if (distance < bestDistance) {
      bestDistance = distance
      bestButton = button
    }
    button.classList.remove('active')
  })
  if (bestButton && bestDistance < 12) {
    bestButton.classList.add('active')
  }
}

function setTextPosition(x, y) {
  state.titleX = Math.max(8, Math.min(92, x))
  state.titleY = Math.max(18, Math.min(88, y))
  els.titleX.value = String(Math.round(state.titleX))
  els.titleY.value = String(Math.round(state.titleY))
  syncPositionControls()
  render()
  renderVariants()
  saveProject()
}

function setTextAlignForX(x) {
  const align = x < 35 ? 'left' : x > 65 ? 'right' : 'center'
  state.titleAlign = align
  document.querySelectorAll('#alignGroup button').forEach((button) => {
    button.classList.toggle('active', button.dataset.align === align)
  })
}

function initPaletteOptions() {
  palettes.forEach((palette) => {
    const option = document.createElement('option')
    option.value = palette.id
    option.textContent = palette.name
    els.palette.appendChild(option)
  })
}

function initSegmented(groupId, key, dataAttr) {
  document.querySelectorAll(`#${groupId} button`).forEach((button) => {
    button.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} button`).forEach((item) => item.classList.remove('active'))
      button.classList.add('active')
      state[key] = button.dataset[dataAttr]
      render()
      renderVariants()
      saveProject()
    })
  })
}

function initPositionGrid() {
  els.positionGrid.querySelectorAll('button').forEach((button) => {
    button.addEventListener('click', () => {
      const x = Number(button.dataset.x)
      const y = Number(button.dataset.y)
      setTextAlignForX(x)
      setTextPosition(x, y)
    })
  })
}

function initCanvasPositioning() {
  let moving = false

  const updateFromPointer = (event) => {
    const rect = els.canvas.getBoundingClientRect()
    const x = ((event.clientX - rect.left) / rect.width) * 100
    const y = ((event.clientY - rect.top) / rect.height) * 100
    setTextPosition(x, y)
  }

  els.canvas.addEventListener('pointerdown', (event) => {
    if (!state.showTitle || state.gradientOnly) return
    moving = true
    els.canvas.setPointerCapture(event.pointerId)
    updateFromPointer(event)
  })

  els.canvas.addEventListener('pointermove', (event) => {
    if (!moving) return
    updateFromPointer(event)
  })

  els.canvas.addEventListener('pointerup', () => {
    moving = false
  })

  els.canvas.addEventListener('pointercancel', () => {
    moving = false
  })
}

function bind() {
  let analyzeTimer = 0

  els.article.addEventListener('input', () => {
    clearTimeout(analyzeTimer)
    saveProject()
    if (els.article.value.trim().length < 80) return
    analyzeTimer = setTimeout(analyzeArticle, 650)
  })

  els.analyze.addEventListener('click', analyzeArticle)
  els.copyAllSeo.addEventListener('click', () => copyText(buildCopyAll()))

  ;[els.title, els.showTitle, els.gradientOnly, els.palette, els.titleX, els.titleY, els.titleSize, els.detail, els.grain, els.softness].forEach((input) => {
    input.addEventListener('input', () => {
      syncTitleVisibility()
      configFromInputs()
      render()
      renderVariants()
      saveProject()
    })
  })

  els.random.addEventListener('click', () => {
    configFromInputs()
    buildVariantSet()
    toast('Nueva portada')
  })

  document.querySelector('#download1xBtn').addEventListener('click', () => download(1))
  document.querySelector('#download2xBtn').addEventListener('click', () => download(2))
  document.querySelector('#copyBtn').addEventListener('click', () => {
    copyPng().catch(() => {
      download(2)
      toast('PNG 2X descargado')
    })
  })

  initSegmented('titleStyleGroup', 'titleStyle', 'style')
  initSegmented('alignGroup', 'titleAlign', 'align')
  initPositionGrid()
  initCanvasPositioning()
}

initPaletteOptions()
const restoredProject = applySavedProject()
bind()
if (!restoredProject) {
  configFromInputs()
  syncTitleVisibility()
  renderSeo()
}
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    if (restoredProject && state.seed && state.variants.length) {
      render()
      renderVariants()
      saveProject()
    } else {
      buildVariantSet()
    }
  })
} else {
  if (restoredProject && state.seed && state.variants.length) {
    render()
    renderVariants()
    saveProject()
  } else {
    buildVariantSet()
  }
}
</script>
</body>
</html>
